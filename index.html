<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Price Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:linear-gradient(135deg,#0ea5e9 0%,#2563eb 45%,#1d4ed8 100%); min-height:100vh;}
    .glass{background:rgba(255,255,255,.10); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,.25);}
    .card-soft{border-radius:18px; box-shadow:0 20px 50px rgba(0,0,0,.25);}
    .muted{color:rgba(255,255,255,.78)!important;}
    .badge-soft{background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22);}
    a.link-light{text-decoration:underline;}
    .price{font-weight:800; letter-spacing:.2px;}
    .product-name{font-size:.9rem; line-height:1.35;}
    .link-row{display:flex; flex-wrap:wrap; gap:.5rem;}
    .link-pill{font-size:.8rem; padding:.2rem .55rem; border-radius:999px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);}
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">
        <div class="glass card-soft p-4 p-md-5 text-white">
          <div class="d-flex align-items-center justify-content-between gap-3 mb-4">
            <div>
              <h1 class="h3 mb-1">Price Finder</h1>
              <div class="muted">Compare Flipkart, Amazon &amp; Myntra — prices and product links.</div>
            </div>
            <span class="badge badge-soft rounded-pill px-3 py-2">Flask + Bootstrap</span>
          </div>

          <form id="searchForm" autocomplete="off" class="mb-4">
            <label class="form-label muted">Product name</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text bg-white bg-opacity-10 border-0 text-white">🔎</span>
              <input id="productName" name="name" class="form-control form-control-lg border-0" placeholder="e.g. Cetaphil Moisturizer" required>
              <button class="btn btn-light btn-lg px-4" type="submit">Search</button>
            </div>
            <div class="form-text muted mt-2">Returns search links, product links, and prices for each store.</div>
          </form>

          <div id="loading" class="d-none">
            <div class="d-flex align-items-center gap-3">
              <div class="spinner-border text-light" role="status"></div>
              <div class="muted">Searching prices…</div>
            </div>
          </div>

          <div id="results" class="d-none">
            <div class="mb-4 p-3 rounded-4 bg-white bg-opacity-10 border">
              <div class="muted small mb-1">Best price</div>
              <div id="bestPrice" class="price display-6">—</div>
              <div id="bestName" class="product-name muted mt-1"></div>
              <div id="bestLinks" class="link-row mt-2"></div>
            </div>

            <div id="storeCards" class="row g-3"></div>

            <hr class="text-white-50 my-4" />
            <div class="muted small">
              Each store shows price, product name, search page link, and product page link when available.
            </div>
          </div>

          <div id="error" class="d-none mt-4 alert alert-danger border-0 bg-white bg-opacity-10 text-white"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('searchForm');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const errorBox = document.getElementById('error');
    const bestPriceEl = document.getElementById('bestPrice');
    const bestNameEl = document.getElementById('bestName');
    const bestLinksEl = document.getElementById('bestLinks');
    const storeCardsEl = document.getElementById('storeCards');

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function linkPill(url, label) {
      if (!url) return '';
      const safe = escapeHtml(url);
      return `<a class="link-light link-pill" href="${safe}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`;
    }

    function formatPrice(item) {
      if (item.price > 0) {
        return item.price_display && !/^\d+$/.test(item.price_display)
          ? item.price_display
          : `₹${item.price}`;
      }
      return 'Not found';
    }

    function renderStoreCard(item) {
      const name = item.name ? `<div class="product-name muted mb-2">${escapeHtml(item.name)}</div>` : '';
      const searchLink = linkPill(item.search_url, 'Search page');
      const productLink = linkPill(item.product_url, 'Product page');
      return `
        <div class="col-12 col-md-4">
          <div class="bg-white bg-opacity-10 border rounded-4 p-3 h-100">
            <div class="muted small">${escapeHtml(item.store)}</div>
            <div class="price fs-4 my-1">${escapeHtml(formatPrice(item))}</div>
            ${name}
            <div class="link-row mt-2">
              ${searchLink || '<span class="muted small">No search link</span>'}
              ${productLink}
            </div>
          </div>
        </div>
      `;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      errorBox.classList.add('d-none');
      errorBox.textContent = '';
      results.classList.add('d-none');
      loading.classList.remove('d-none');
      storeCardsEl.innerHTML = '';

      const name = document.getElementById('productName').value.trim();

      try {
        const res = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data?.error || 'Search failed');

        const items = data.results || [];
        storeCardsEl.innerHTML = items.map(renderStoreCard).join('');

        if (data.best_price > 0) {
          bestPriceEl.textContent = `₹${data.best_price}`;
          bestNameEl.textContent = data.best_name
            ? `${data.best_label}: ${data.best_name}`
            : '';
          bestLinksEl.innerHTML = [
            linkPill(data.best_url, 'Search page'),
            linkPill(data.best_product_url, 'Product page'),
          ].join('');
        } else {
          bestPriceEl.textContent = 'Not found';
          bestNameEl.textContent = 'Try a different product name or check store search links below.';
          bestLinksEl.innerHTML = '';
        }

        results.classList.remove('d-none');
        loading.classList.add('d-none');
      } catch (err) {
        loading.classList.add('d-none');
        errorBox.textContent = err.message || String(err);
        errorBox.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
